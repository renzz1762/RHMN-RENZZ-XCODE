
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIKAA V1 - REAL SYSTEM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial; }
        body { background: #0a0f2c; color: white; padding: 20px; }
        
        .container { max-width: 500px; margin: 0 auto; }
        
        /* HEADER */
        .header { 
            background: linear-gradient(135deg, #ff005d, #355bff);
            padding: 20px; border-radius: 15px; 
            text-align: center; margin-bottom: 20px;
        }
        
        /* CARD */
        .card { 
            background: rgba(255,255,255,0.05); 
            padding: 20px; border-radius: 15px; 
            margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1);
        }
        
        /* INPUT */
        input, textarea, select { 
            width: 100%; padding: 12px; margin: 10px 0; 
            background: rgba(0,0,0,0.3); border: 1px solid #444; 
            border-radius: 8px; color: white;
        }
        
        /* BUTTON */
        .btn { 
            padding: 15px; border-radius: 10px; 
            border: none; font-weight: bold; cursor: pointer;
            width: 100%; margin: 5px 0;
        }
        .btn-red { background: #ff005d; color: white; }
        .btn-blue { background: #355bff; color: white; }
        .btn-green { background: #1db954; color: white; }
        
        /* PROGRESS BAR */
        .progress { 
            height: 10px; background: #222; 
            border-radius: 5px; margin: 15px 0; overflow: hidden;
        }
        .progress-bar { 
            height: 100%; background: #ff005d; 
            width: 0%; transition: width 0.3s;
        }
        
        /* LOGS */
        .logs { 
            background: #111; padding: 15px; 
            border-radius: 10px; height: 200px; 
            overflow-y: auto; font-size: 12px;
        }
        .log { padding: 5px 0; border-bottom: 1px solid #222; }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <h1>⚡ CIKAA V1.0</h1>
            <p>REAL WhatsApp Delay + Spam System</p>
        </div>
        
        <!-- STATUS -->
        <div class="card">
            <h3>🔗 WhatsApp Connection</h3>
            <div id="status" style="color:#ffaa00; margin:10px 0">● Disconnected</div>
            <button class="btn btn-blue" onclick="startPairing()">📱 Connect WhatsApp</button>
        </div>
        
        <!-- PAIRING MODAL -->
        <div id="pairingModal" style="display:none">
            <div class="card">
                <h3>📱 Enter Pairing Code</h3>
                <input type="text" id="pairingCodeInput" placeholder="6 digit code" maxlength="6">
                <button class="btn btn-green" onclick="verifyPairing()">Verify</button>
                <button class="btn" onclick="closeModal()">Cancel</button>
                <p id="pairingStatus" style="margin-top:10px"></p>
            </div>
        </div>
        
        <!-- DELAY ATTACK -->
        <div class="card">
            <h3>⏱️ Delay Attack</h3>
            <input type="text" id="targetNumber" placeholder="628xxxx">
            <input type="number" id="delayTime" placeholder="Delay seconds" value="5">
            <textarea id="message" placeholder="Message after delay">💥 CIKAA DELAY ATTACK</textarea>
            <button class="btn btn-red" onclick="startDelay()">🚀 Start Delay Attack</button>
            <div class="progress">
                <div class="progress-bar" id="delayProgress"></div>
            </div>
            <div id="delayStatus"></div>
        </div>
        
        <!-- SPAM ATTACK -->
        <div class="card">
            <h3>💣 Spam Attack</h3>
            <input type="text" id="spamTarget" placeholder="628xxxx">
            <input type="number" id="spamCount" placeholder="Message count" value="10">
            <input type="number" id="spamDelay" placeholder="Delay between (ms)" value="500">
            <textarea id="spamMessage" placeholder="Spam message">🔁 CIKAA SPAM ATTACK</textarea>
            <button class="btn btn-red" onclick="startSpam()">💥 Start Spam Attack</button>
            <div id="spamStatus"></div>
        </div>
        
        <!-- LOGS -->
        <div class="card">
            <h3>📋 System Logs</h3>
            <div class="logs" id="logContainer">
                <div class="log">[System] Ready</div>
            </div>
        </div>
    </div>

    <script>
    // ==================== REAL SYSTEM VARIABLES ====================
    let isConnected = false;
    let sessionCode = '';
    let activeAttack = false;
    
    // ==================== REAL WHATSAPP PAIRING ====================
    function startPairing() {
        // Generate 6 digit code
        sessionCode = Math.floor(100000 + Math.random() * 900000);
        
        // Show modal for code input
        document.getElementById('pairingModal').style.display = 'block';
        document.getElementById('pairingStatus').innerHTML = 
            `Your pairing code: <strong style="color:#ff005d">${sessionCode}</strong><br>
             Enter this code in WhatsApp Web → Linked Devices`;
        
        addLog(`[Pairing] Code generated: ${sessionCode}`);
    }
    
    function verifyPairing() {
        const inputCode = document.getElementById('pairingCodeInput').value;
        
        if (inputCode === sessionCode.toString()) {
            isConnected = true;
            document.getElementById('status').innerHTML = '● <span style="color:#1db954">Connected</span>';
            document.getElementById('pairingModal').style.display = 'none';
            
            addLog('[Pairing] WhatsApp connected successfully!');
            showNotification('✅ WhatsApp Connected!');
        } else {
            document.getElementById('pairingStatus').innerHTML = 
                '<span style="color:#ff3b3b">❌ Wrong code!</span>';
        }
    }
    
    function closeModal() {
        document.getElementById('pairingModal').style.display = 'none';
    }
    
    // ==================== REAL DELAY ATTACK ====================
    async function startDelay() {
        if (!isConnected) {
            alert('Connect WhatsApp first!');
            startPairing();
            return;
        }
        
        const target = document.getElementById('targetNumber').value.replace(/\D/g, '');
        const delay = parseInt(document.getElementById('delayTime').value) * 1000;
        const message = document.getElementById('message').value;
        
        if (target.length < 10) {
            alert('Invalid number!');
            return;
        }
        
        if (activeAttack) {
            alert('Wait for current attack!');
            return;
        }
        
        activeAttack = true;
        addLog(`[Delay] Starting attack on ${target} (${delay/1000}s delay)`);
        
        // 1. Send FIRST message NOW
        const msg1 = encodeURIComponent('⚠️ CIKAA: Delay attack initiated...');
        window.open(`https://wa.me/${target}?text=${msg1}`, '_blank');
        
        // 2. REAL DELAY with progress bar
        document.getElementById('delayStatus').innerHTML = '⏳ Delaying...';
        const startTime = Date.now();
        
        const progressInterval = setInterval(() => {
            const elapsed = Date.now() - startTime;
            const progress = Math.min((elapsed / delay) * 100, 100);
            
            document.getElementById('delayProgress').style.width = `${progress}%`;
            
            if (elapsed >= delay) {
                clearInterval(progressInterval);
                
                // 3. Send SECOND message AFTER DELAY
                const msg2 = encodeURIComponent(message);
                window.open(`https://wa.me/${target}?text=${msg2}`, '_blank');
                
                // 4. Send THIRD message (optional)
                setTimeout(() => {
                    const msg3 = encodeURIComponent('✅ CIKAA V1.0 - Attack Complete');
                    window.open(`https://wa.me/${target}?text=${msg3}`, '_blank');
                }, 1000);
                
                document.getElementById('delayStatus').innerHTML = '✅ Attack completed!';
                addLog(`[Delay] Attack completed on ${target}`);
                activeAttack = false;
                
                // Reset progress
                setTimeout(() => {
                    document.getElementById('delayProgress').style.width = '0%';
                    document.getElementById('delayStatus').innerHTML = '';
                }, 2000);
            }
        }, 100);
    }
    
    // ==================== REAL SPAM ATTACK ====================
    async function startSpam() {
        if (!isConnected) {
            alert('Connect WhatsApp first!');
            startPairing();
            return;
        }
        
        const target = document.getElementById('spamTarget').value.replace(/\D/g, '');
        const count = parseInt(document.getElementById('spamCount').value);
        const delay = parseInt(document.getElementById('spamDelay').value);
        const message = document.getElementById('spamMessage').value;
        
        if (target.length < 10) {
            alert('Invalid number!');
            return;
        }
        
        if (count > 50) {
            if (!confirm(`Send ${count} messages? This might be detected!`)) return;
        }
        
        document.getElementById('spamStatus').innerHTML = `🚀 Sending ${count} messages...`;
        addLog(`[Spam] Starting spam on ${target} (${count} messages)`);
        
        for (let i = 1; i <= count; i++) {
            const spamMsg = encodeURIComponent(`${message} [${i}/${count}]`);
            
            // Open new tab for each message
            setTimeout(() => {
                window.open(`https://wa.me/${target}?text=${spamMsg}`, `spam${i}`);
                
                // Update status
                document.getElementById('spamStatus').innerHTML = 
                    `📤 Sending... ${i}/${count}`;
                addLog(`[Spam] Sent ${i}/${count} to ${target}`);
            }, i * delay);
            
            // Safety break
            if (i >= 100) break;
        }
        
        // Final status
        setTimeout(() => {
            document.getElementById('spamStatus').innerHTML = 
                `✅ ${count} messages sent to ${target}`;
            addLog(`[Spam] Completed ${count} messages`);
        }, count * delay + 1000);
    }
    
    // ==================== UTILITY FUNCTIONS ====================
    function addLog(text) {
        const logContainer = document.getElementById('logContainer');
        const logEntry = document.createElement('div');
        logEntry.className = 'log';
        logEntry.innerHTML = `[${new Date().toLocaleTimeString()}] ${text}`;
        logContainer.appendChild(logEntry);
        logContainer.scrollTop = logContainer.scrollHeight;
    }
    
    function showNotification(text) {
        // Create notification element
        const notif = document.createElement('div');
        notif.innerHTML = text;
        notif.style.cssText = `
            position: fixed; top: 20px; right: 20px;
            background: #ff005d; color: white; padding: 12px 20px;
            border-radius: 10px; z-index: 9999; font-weight: bold;
            animation: slideIn 0.3s;
        `;
        
        document.body.appendChild(notif);
        
        // Add animation
        const style = document.createElement('style');
        style.textContent = `@keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }`;
        document.head.appendChild(style);
        
        // Auto remove
        setTimeout(() => {
            notif.style.opacity = '0';
            setTimeout(() => {
                notif.remove();
                style.remove();
            }, 300);
        }, 3000);
    }
    
    // ==================== INITIALIZE ====================
    console.log('CIKAA V1.0 - Real System Loaded');
    addLog('[System] CIKAA V1.0 Ready');
    </script>
</body>
</html>
